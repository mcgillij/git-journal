<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Git Journal{% endblock %}</title>
    <!-- HTMX -->
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #1a1b26;
            --surface: #24283b;
            --border: #393b57;
            --text: #c0caf5;
            --text-dim: #565f89;
            --accent: #7aa2f7;
            --accent-hover: #89b4fa;
            --green: #9ece6a;
            --red: #f7768e;
            --yellow: #e0af68;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        a { color: var(--accent); text-decoration: none; }
        a:hover { color: var(--accent-hover); }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 { font-size: 1.3rem; color: var(--accent); }
        .header nav a { margin-left: 1.5rem; font-size: 0.9rem; }

        /* Container */
        .container { max-width: none; margin: 0 auto; padding: 1rem 0.5rem; }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1rem;
        }

        /* Project cards on index page */
        .project-grid { display: grid; gap: 1rem; }
        .project-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.25rem;
            transition: border-color 0.2s;
        }
        .project-card:hover { border-color: var(--accent); }
        .project-card h3 { margin-bottom: 0.5rem; }
        .project-meta { font-size: 0.85rem; color: var(--text-dim); }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-active { background: rgba(158,206,106,0.15); color: var(--green); }
        .badge-inactive { background: rgba(247,118,142,0.15); color: var(--red); }

        /* Calendar */
        .calendar-container { display: flex; gap: 2rem; }
        .article-list { width: 280px; flex-shrink: 0; }
        .calendar-widget { flex: 1; }

        .calendar-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        .calendar-table th {
            padding: 0.5rem;
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-dim);
            font-weight: 600;
        }
        .calendar-table td {
            padding: 0.25rem;
            text-align: center;
            height: 40px;
            vertical-align: middle;
        }
        .cal-day {
            display: inline-block;
            width: 36px;
            height: 36px;
            line-height: 36px;
            border-radius: 50%;
            font-size: 0.85rem;
            text-align: center;
        }
        .cal-day.empty { visibility: hidden; }
        .cal-day.has-article {
            background: var(--accent);
            color: #1a1b26;
            font-weight: 700;
        }
        .cal-day.has-article:hover {
            background: var(--accent-hover);
            cursor: pointer;
        }

        /* Article list sidebar */
        .article-list h3 { margin-bottom: 1rem; font-size: 1rem; }
        .article-date-link {
            display: block;
            padding: 0.5rem 0.75rem;
            border-radius: 4px;
            color: var(--text);
            font-size: 0.85rem;
            margin-bottom: 0.25rem;
        }
        .article-date-link:hover { background: rgba(122,162,247,0.1); color: var(--accent); }

        /* Article content */
        .article-content { line-height: 1.8; max-width: 100%; overflow-x: auto; }
        .article-content h1, .article-content h2, .article-content h3 { margin-top: 1.5rem; margin-bottom: 0.75rem; color: var(--accent); }
        .article-content p { margin-bottom: 1rem; word-wrap: break-word; overflow-wrap: break-word; }
        .article-content code { background: rgba(122,162,247,0.1); padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.9em; word-break: break-all; }
        .article-content pre { background: var(--surface); padding: 1rem; border-radius: 6px; overflow-x: auto; margin-bottom: 1rem; max-width: 100%; }
        .article-content img { max-width: 100%; height: auto; }
        .article-content ul, .article-content ol { margin-left: 1.5rem; margin-bottom: 1rem; }

        /* Stats bar */
        .stats-bar { display: flex; gap: 2rem; margin-bottom: 1.5rem; font-size: 0.85rem; color: var(--text-dim); }
        .stat-item strong { color: var(--text); }

        /* Buttons */
        .btn {
            display: inline-block;
            padding: 0.5rem 1.25rem;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            transition: all 0.2s;
        }
        .btn:hover { border-color: var(--accent); color: var(--accent); }
        .btn-primary { background: var(--accent); color: #1a1b26; border-color: var(--accent); font-weight: 600; }
        .btn-primary:hover { background: var(--accent-hover); }

        /* Flash messages */
        .flash { padding: 0.75rem 1rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
        .flash-success { background: rgba(158,206,106,0.15); color: var(--green); border: 1px solid rgba(158,206,106,0.3); }

        /* Admin table */
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        .admin-table th, .admin-table td { padding: 0.75rem; text-align: left; border-bottom: 1px solid var(--border); }
        .admin-table th { color: var(--text-dim); font-weight: 600; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }

        /* Month nav */
        .month-nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
        .month-nav h2 { font-size: 1.2rem; }

        /* Responsive */
        @media (max-width: 768px) {
            .calendar-container { flex-direction: column-reverse; }
            .article-list { width: 100%; }
            .container { padding: 1rem; }
        }
    </style>
</head>
<body>
    <header class="header">
        <h1><a href="/">Git Journal</a></h1>
        <nav>
            <a href="/">Projects</a>
            <a href="/admin">Admin</a>
        </nav>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
